{% extends 'base.html' %}

{% block title %}退出成功 - GaitFix{% endblock %}

{% block extra_css %}
<style>
    .logout-shell {
        padding: 4rem 0 6rem;
    }

    .logout-card {
        border: 1px solid rgba(255,255,255,.72);
        border-radius: 30px;
        background: rgba(255,255,255,.88);
        box-shadow: 0 22px 50px rgba(15,23,42,.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 2.2rem;
        text-align: center;
    }

    .logout-icon {
        width: 110px;
        height: 110px;
        margin: 0 auto 1rem;
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(22,163,74,.12), rgba(14,165,233,.12));
        color: #16a34a;
        font-size: 3rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container logout-shell">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="logout-card">
                <div class="logout-icon">
                    <i class="bi bi-check-circle"></i>
                </div>
                <h2 class="fw-bold mb-3">你已成功退出登录</h2>
                <p class="text-muted mb-4">感谢使用 GaitFix。你可以返回首页，或在需要时重新登录继续查看分析记录。</p>

                <div class="d-flex gap-2 justify-content-center flex-wrap">
                    <a href="{% url 'users:login' %}" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-box-arrow-in-right me-2"></i>重新登录
                    </a>
                    <a href="{% url 'main:home' %}" class="btn btn-outline-secondary rounded-pill px-4">
                        返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
